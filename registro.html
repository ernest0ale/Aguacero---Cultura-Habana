<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Cultura Habana</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            padding: 2rem;
        }
        .auth-card {
            background: var(--color-surface);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px var(--shadow-border);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: rgb(2, 90, 138);
        }
        .auth-card .subtitle {
            text-align: center;
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--color-text-primary);
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-bg);
            color: var(--color-text-primary);
            font-size: 1rem;
        }
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-wrapper input {
            width: 100%;
            padding: 0.8rem;
            padding-right: 3rem;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--color-text-secondary);
            background: none;
            border: none;
        }
        .phone-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .phone-prefix {
            width: 70px;
            padding: 0.8rem;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            text-align: center;
        }
        .phone-number {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-bg);
        }
        .btn-register {
            width: 100%;
            padding: 0.8rem;
            background: rgb(2, 90, 138);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-register:hover {
            background: rgb(2, 110, 168);
            transform: translateY(-2px);
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--color-text-secondary);
        }
        .login-link a {
            color: rgb(2, 90, 138);
            text-decoration: none;
            font-weight: 600;
        }
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        /* Estilos para preferencias */
        .preferences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .pref-card {
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: 12px;
            padding: 0.6rem 0.3rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pref-card .pref-emoji {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.2rem;
        }

        .pref-card .pref-name {
            font-size: 0.7rem;
            font-weight: 500;
        }
        .select-all-btn {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: var(--color-border);
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="registro-card">
            
            
            <div id="message"></div>
            
            <!-- Paso 1: Registro -->
            <div id="step-registro">
                <h1>Cultura Habana</h1>
                <p class="subtitle">Crea tu cuenta y disfruta de más funciones</p>
                <form id="register-form">
                    <div class="form-group">
                        <label>Nombre completo *</label>
                        <input type="text" id="nombre" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico *</label>
                        <input type="email" id="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <div class="phone-container">
                            <span class="phone-prefix">+53</span>
                            <input type="tel" id="telefono" class="phone-number" placeholder="5XXXXXXXX" maxlength="8">
                        </div>
                        <small style="color: var(--color-text-secondary);">8 dígitos (ejemplo: 51234567)</small>
                    </div>
                    <div class="form-group">
                        <input type="hidden" id="rol" value="usuario">
                    </div>
                    <div class="form-group">
                        <label>Contraseña *</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required autocomplete="new-password" minlength="4">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar contraseña *</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirm_password" required autocomplete="new-password">
                            <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-register">Registrarme</button>
                </form>
                
                <div class="login-link">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
                </div>
                <div class="login-link">
                    <a href="inicio.html">← Continuar sin registrar</a>
                </div>
            </div>
            
            <!-- Paso 2: Preferencias -->
            <div id="step-preferencias" style="display: none;">
                <h2 style="text-align: center; margin-bottom: 0.5rem;">Elige tus preferencias</h2>
                <p style="text-align: center; color: var(--color-text-secondary); margin-bottom: 1rem;">Selecciona las categorías que más te interesan</p>
                
                <div style="text-align: center;">
                    <span class="select-all-btn" id="selectAllBtn">Seleccionar todas</span>
                </div>
                
                <div id="preferences-grid" class="preferences-grid"></div>
                
                <button id="savePreferencesBtn" class="btn-register">Iniciar</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // ==================== TEMA OSCURO PERSISTENTE ====================
        let isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        function applyTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }
        
        applyTheme();
        
        // ==================== VARIABLES ====================
        let temporalUserData = null;
        
        const categoriasConEmojis = [
            { nombre: "Conciertos", emoji: "🎵" },
            { nombre: "Teatro", emoji: "🎭" },
            { nombre: "Cine", emoji: "🎬" },
            { nombre: "Exposiciones", emoji: "🖼️" },
            { nombre: "Danza", emoji: "💃" },
            { nombre: "Libros", emoji: "📚" },
            { nombre: "Festival", emoji: "🎉" },
            { nombre: "Infantiles", emoji: "🧸" },
            { nombre: "Deportes", emoji: "⚽" },
            { nombre: "Talleres", emoji: "🔧" },
            { nombre: "Museos", emoji: "🏛️" },
            { nombre: "Ferias", emoji: "🛍️" },
            { nombre: "Farándula", emoji: "✨" }
        ];
        
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }
        
        function mostrarMensaje(mensaje, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = tipo === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = mensaje;
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 3000);
        }
        
        function renderizarPreferencias() {
            const container = document.getElementById('preferences-grid');
            container.innerHTML = categoriasConEmojis.map(cat => `
                <div class="pref-card" data-categoria="${cat.nombre}" style="cursor: pointer;">
                    <span class="pref-emoji">${cat.emoji}</span>
                    <span class="pref-name">${cat.nombre}</span>
                </div>
            `).join('');
            
            // Seleccionar todas por defecto
            const cards = document.querySelectorAll('.pref-card');
            cards.forEach(card => {
                card.classList.add('selected');
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    card.classList.toggle('selected');
                });
            });
        }

        function getSelectedPreferences() {
            const selected = [];
            document.querySelectorAll('.pref-card.selected').forEach(card => {
                selected.push(card.getAttribute('data-categoria'));
            });
            return selected;
        }
        
        document.getElementById('selectAllBtn')?.addEventListener('click', () => {
            const cards = document.querySelectorAll('.pref-card');
            const allSelected = Array.from(cards).every(card => card.classList.contains('selected'));
            cards.forEach(card => {
                if (allSelected) {
                    card.classList.remove('selected');
                } else {
                    card.classList.add('selected');
                }
            });
        });
        
        document.getElementById('savePreferencesBtn')?.addEventListener('click', () => {
        const preferencias = getSelectedPreferences();
        console.log("=========================================");
        console.log("💾 Guardando preferencias:", preferencias);
        
        if (temporalUserData) {
            temporalUserData.preferencias = preferencias;
            console.log("📦 Registrando usuario:", temporalUserData);
            
            const resultado = registrarUsuario(temporalUserData);
            console.log("📊 Resultado registro:", resultado);
            
            if (resultado.exito) {
                console.log("✅ Usuario registrado. Intentando iniciar sesión...");
                
                // Intentar iniciar sesión con el nuevo usuario
                const loginResult = iniciarSesion(temporalUserData.email, temporalUserData.password);
                console.log("📊 Resultado login:", loginResult);
                
                if (loginResult.exito) {
                    console.log("✅ Login exitoso, redirigiendo a inicio.html");
                    window.location.href = 'inicio.html';
                } else {
                    console.log("❌ Login falló:", loginResult.mensaje);
                    mostrarMensaje("Error al iniciar sesión automáticamente. Por favor inicia sesión manualmente.", 'error');
                    // Redirigir al login para que el usuario intente manualmente
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } else {
                console.log("❌ Registro falló:", resultado.mensaje);
                mostrarMensaje(resultado.mensaje, 'error');
            }
        }
        console.log("=========================================");
    });
        
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (password !== confirmPassword) {
                mostrarMensaje('Las contraseñas no coinciden', 'error');
                return;
            }
            
            if (password.length < 8) {
                mostrarMensaje('La contraseña debe tener al menos 8 caracteres', 'error');
                return;
            }
            
            let telefonoCompleto = '';
            const telefonoNum = document.getElementById('telefono').value.trim();
            if (telefonoNum) {
                if (!/^\d{8}$/.test(telefonoNum)) {
                    mostrarMensaje('El teléfono debe tener 8 dígitos', 'error');
                    return;
                }
                telefonoCompleto = '+53 ' + telefonoNum;
            }
            
            temporalUserData = {
                nombre: document.getElementById('nombre').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: telefonoCompleto,
                rol: document.getElementById('rol').value,
                password: password
            };
            
            document.getElementById('step-registro').style.display = 'none';
            document.getElementById('step-preferencias').style.display = 'block';
            renderizarPreferencias();
        });
        
        document.getElementById('telefono').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 8);
        });
        
        window.togglePassword = togglePassword;
    </script>
</body>
</html>
