<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de eventos | Cultura Habana</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        /* ========== ESTILOS PARA EL PANEL DE FILTROS ========== */
        .map-filters-bar {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            background: var(--color-surface);
            border-radius: 20px;
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(var(--color-surface-rgb, 255, 255, 255), 0.95);
            transition: all 0.3s ease;
            min-width: 320px;
            width: auto;
            max-width: calc(100% - 2rem);
        }
        
        body.dark-mode .map-filters-bar {
            background: rgba(30, 34, 39, 0.95);
        }
        
        .filter-category-row {
            margin-bottom: 1rem;
        }
        
        .filter-category-label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgb(2, 90, 138);
            margin-bottom: 0.75rem;
            display: block;
        }
        
        body.dark-mode .filter-category-label {
            color: #5dade2;
        }
        
        .map-categorias {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .map-category-chip {
            padding: 0.4rem 1rem;
            background: var(--color-bg);
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
            white-space: nowrap;
        }
        
        .map-category-chip:hover {
            transform: translateY(-2px);
            border-color: rgb(2, 90, 138);
        }
        
        .map-category-chip.active {
            background: rgb(2, 90, 138);
            color: white;
            border-color: rgb(2, 90, 138);
        }
        
        .filter-divider {
            height: 1px;
            background: var(--color-border);
            margin: 0.75rem 0;
        }
        
        /* FILA DE CARACTERÍSTICAS - Checkboxes al lado del título */
        .filter-features-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .filter-features-label {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgb(2, 90, 138);
            flex-shrink: 0;
        }
        
        .filter-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            flex: 1;
        }
        
        .filter-checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--color-text-primary);
            padding: 0.3rem 0.8rem;
            background: var(--color-bg);
            border-radius: 40px;
            transition: all 0.2s ease;
            border: 1px solid var(--color-border);
        }
        
        .filter-checkbox-item:hover {
            border-color: rgb(2, 90, 138);
        }
        
        .filter-checkbox-item input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        /* ========== ESTILOS PARA EL MAPA CON SIDEBAR ========== */
        .mapa-container-full {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        #mapa-principal {
            height: 100%;
            width: 100%;
            min-height: 500px;
        }
        
        .main-content {
            position: relative;
            padding: 0 !important;
            height: calc(100vh - var(--header-height, 64px));
            overflow: hidden;
        }
        
        /* ========== CORRECCIÓN BOTONES ZOOM MAPA EN MODO OSCURO ========== */
        body.dark-mode .leaflet-control-zoom-in,
        body.dark-mode .leaflet-control-zoom-out {
            background-color: var(--color-surface) !important;
            color: var(--color-text-primary) !important;
            border: 1px solid var(--color-border) !important;
        }
        
        body.dark-mode .leaflet-control-zoom-in:hover,
        body.dark-mode .leaflet-control-zoom-out:hover {
            background-color: var(--color-bg) !important;
        }
        
        body.dark-mode .leaflet-control-zoom-in span,
        body.dark-mode .leaflet-control-zoom-out span {
            color: var(--color-text-primary) !important;
        }
        
        body.dark-mode .leaflet-layer,
        body.dark-mode .leaflet-control-attribution {
            filter: hue-rotate(180deg) brightness(200%) contrast(100%);
        }
        
        body.dark-mode .leaflet-control-attribution {
            background-color: rgb(98, 106, 108);
            color: white;
        }
        
        body.dark-mode .leaflet-control-attribution a {
            color: #ffffff;
        }
        
        body.dark-mode .leaflet-popup-content-wrapper {
            background-color: var(--color-surface);
            color: var(--color-text-primary);
        }
        
        body.dark-mode .leaflet-popup-tip {
            background-color: var(--color-surface);
        }
        
        .leaflet-container {
            background-color: #e0e0e0;
        }
        
        body.dark-mode .leaflet-container {
            background-color: #1a1a1a;
        }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 700px) {
            #mapa-principal {
                height: calc(100vh - 120px) !important;
            }
            .map-filters-bar {
                padding: 0.8rem 1rem;
                min-width: auto;
                left: 0.5rem;
                right: 0.5rem;
            }
            .map-category-chip {
                padding: 0.3rem 0.7rem;
                font-size: 0.7rem;
            }
            .filter-features-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-checkboxes {
                width: 100%;
                justify-content: space-between;
            }
            .filter-checkbox-item {
                flex: 1;
                justify-content: center;
            }
        }
        
        /* Escritorio: panel más ancho */
        @media (min-width: 701px) {
            .map-filters-bar {
                min-width: 450px;
                max-width: 600px;
            }
        }
    </style>
</head>
<body>

    <!-- Barra superior fija -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-toggle-btn" id="menuToggleBtn">
                <img id="menuIcon" src="resources/icons_light/menu.png" alt="menú">
            </button>
            <div class="logo">
                <img src="resources/aguacero_cuba_logo_trasnparente.png" alt="Logo">
                <span>Cultura Habana</span>
            </div>
        </div>
        
        <div class="top-bar-center">
            <div class="search-container">
                <input type="text" id="buscador-global" placeholder="Buscar eventos...">
                <button class="search-btn" id="searchBtn">
                    <img id="searchIconLight" src="resources/icons_light/search.png" alt="buscar">
                    <img id="searchIconDark" src="resources/icons_dark/search.png" alt="buscar" style="display:none;">
                </button>
            </div>
        </div>
        
        <div class="top-bar-right">
            <button class="icon-btn" id="themeToggleBtn">
                <img id="themeIconLight" src="resources/icons_light/moon.png" alt="tema">
                <img id="themeIconDark" src="resources/icons_dark/sun.png" alt="tema" style="display:none;">
            </button>
            <div class="notifications-wrapper">
                <button class="icon-btn" id="notificationsBtn">
                    <img id="notifIconLight" src="resources/icons_light/bell.png" alt="notificaciones">
                    <img id="notifIconDark" src="resources/icons_dark/bell.png" alt="notificaciones" style="display:none;">
                    <span id="notifCounter" class="notif-counter" style="display: none;">0</span>
                </button>
                <div id="notificationsPanel" class="notifications-panel">
                    <div class="notifications-header">Notificaciones</div>
                    <div class="notifications-list"></div>
                </div>
            </div>
            <div class="avatar" id="avatarUsuario">U</div>
        </div>
    </div>

    <!-- Menú lateral -->
    <div class="sidebar" id="sidebar">
        <div class="menu_container">
            <ul class="menu">
                <li class="menu-item">
                    <a href="inicio.html" class="menu-link">
                        <img class="home-light" src="resources/icons_light/home-alt.png" alt="inicio">
                        <img class="home-dark" src="resources/icons_dark/home-alt.png" alt="inicio" style="display:none;">
                        <span>Inicio</span>
                    </a>
                </li>
                <li class="menu-item menu-item-dropdown" id="categoriasDropdown">
                    <a href="#" class="menu-link" id="categoriasBtn">
                        <img class="categories-light" src="resources/icons_light/price-tag-alt.png" alt="categorías">
                        <img class="categories-dark" src="resources/icons_dark/price-tag-alt.png" alt="categorías" style="display:none;">
                        <span>Categorías</span>
                        <img class="dropdown-light" src="resources/icons_light/chevron-down.png" alt="dropdown">
                        <img class="dropdown-dark" src="resources/icons_dark/chevron-down.png" alt="dropdown" style="display:none;">
                    </a>
                    <ul class="sub-menu" id="submenuCategorias">
                        <li><a href="#" class="sub-menu-link" data-categoria="Conciertos">Conciertos</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Teatro">Teatro</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Cine">Cine</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Exposiciones">Exposiciones</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Danza">Danza</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Libros">Libros</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Festival">Festival</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Infantiles">Infantiles</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Deportes">Deportes</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Talleres">Talleres</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Museos">Museos</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Ferias">Ferias</a></li>
                        <li><a href="#" class="sub-menu-link" data-categoria="Farándula">Farándula</a></li>
                    </ul>
                </li>
                <li class="menu-item">
                    <a href="calendario.html" class="menu-link">
                        <img class="calendar-light" src="resources/icons_light/calendar-alt.png" alt="calendario">
                        <img class="calendar-dark" src="resources/icons_dark/calendar-alt.png" alt="calendario" style="display:none;">
                        <span>Calendario</span>
                    </a>
                </li>
                <li class="menu-item active">
                    <a href="mapa.html" class="menu-link">
                        <img class="map-light" src="resources/icons_light/map.png" alt="mapa">
                        <img class="map-dark" src="resources/icons_dark/map.png" alt="mapa" style="display:none;">
                        <span>Mapa</span>
                    </a>
                </li>
                <li class="menu-item" id="menuPromocion" style="display: none;">
                    <a href="promocion.html" class="menu-link">
                        <img class="promo-light" src="resources/icons_light/plus-circle.png" alt="promocionar">
                        <img class="promo-dark" src="resources/icons_dark/plus-circle.png" alt="promocionar" style="display:none;">
                        <span>Promocionar</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Contenido principal - Mapa (sin footer) -->
    <div class="main-content">
        <div class="mapa-container-full">
            <div id="mapa-principal"></div>
            
            <div class="map-filters-bar" id="mapFiltersBar">
                <div class="filter-category-row">
                    <div class="filter-category-label">CATEGORÍAS</div>
                    <div id="map-categorias" class="map-categorias"></div>
                </div>
                
                <div class="filter-divider"></div>
                
                <div class="filter-features-row">
                    <div class="filter-checkboxes">
                        <label class="filter-checkbox-item">
                            <input type="checkbox" id="map-filtro-apto-menores"> 👶 Apto para menores
                        </label>
                        <label class="filter-checkbox-item">
                            <input type="checkbox" id="map-filtro-aire-libre"> 🌳 Al aire libre
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- NO HAY FOOTER en mapa.html para no interferir con el scroll del mapa -->

    <script src="data.js"></script>
    <script src="notifications.js"></script>
    <script src="script.js"></script>
    <script>
        // Aplicar color primario del usuario
        if (typeof aplicarColorPrimarioUsuario === 'function') {
            aplicarColorPrimarioUsuario();
        }

        // ==================== MAPA ====================
        let map;
        let markerClusterGroup;
        let categoriasActivas = [];
        let mapInitialized = false;
        
        const filtroMapaMenores = document.getElementById('map-filtro-apto-menores');
        const filtroMapaAireLibre = document.getElementById('map-filtro-aire-libre');
        
        function getTileUrl() {
            const isDark = document.body.classList.contains('dark-mode');
            return isDark ? 
                'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' :
                'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
        }
        
        function initMap() {
            if (mapInitialized) return;
            
            const mapContainer = document.getElementById('mapa-principal');
            if (!mapContainer) return;
            
            map = L.map('mapa-principal').setView([23.1136, -82.3666], 12);
            
            L.tileLayer(getTileUrl(), {
                attribution: '&copy; <a href="https://carto.com/">CartoDB</a> | &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            
            markerClusterGroup = L.markerClusterGroup();
            map.addLayer(markerClusterGroup);
            
            mapInitialized = true;
            cargarMarcadores();
        }
        
        function cargarMarcadores() {
            if (!markerClusterGroup || !mapInitialized) return;
            markerClusterGroup.clearLayers();
            
            let eventos = getEventosFuturos();
            
            if (categoriasActivas.length > 0) {
                eventos = eventos.filter(e => categoriasActivas.includes(e.categoria));
            }
            if (filtroMapaMenores?.checked) {
                eventos = eventos.filter(e => e.aptoMenores === true);
            }
            if (filtroMapaAireLibre?.checked) {
                eventos = eventos.filter(e => e.aireLibre === true);
            }
            
            eventos.forEach(evento => {
                if (evento.lat && evento.lng) {
                    const marker = L.marker([evento.lat, evento.lng]);
                    marker.bindPopup(`
                        <div style="min-width: 200px;">
                            <img src="${evento.poster}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px;" onerror="this.src='https://picsum.photos/id/100/200/100'">
                            <h4 style="margin: 0 0 4px 0;">${evento.nombre}</h4>
                            <p style="margin: 0; font-size: 12px;">📅 ${formatFechaDDMMYYYY(evento.fechaInicio)}</p>
                            <p style="margin: 4px 0 0 0; font-size: 12px;"><strong>${evento.categoria}</strong></p>
                            <button onclick="window.location.href='detallesEvento.html?id=${evento.id}'" style="margin-top: 8px; padding: 4px 12px; background: rgb(2,90,138); color: white; border: none; border-radius: 20px; cursor: pointer;">Ver detalles</button>
                        </div>
                    `);
                    marker.on('mouseover', function() { this.openPopup(); });
                    markerClusterGroup.addLayer(marker);
                }
            });
        }
        
        function renderizarFiltrosMapa() {
            const categorias = getCategoriasConEventos();
            categoriasActivas = [...categorias];
            
            const container = document.getElementById('map-categorias');
            if (!container) return;
            
            container.innerHTML = categorias.map(cat => `
                <div class="map-category-chip ${categoriasActivas.includes(cat) ? 'active' : ''}" data-cat="${cat}">${cat}</div>
            `).join('');
            
            document.querySelectorAll('.map-category-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const cat = chip.getAttribute('data-cat');
                    if (categoriasActivas.includes(cat)) {
                        categoriasActivas = categoriasActivas.filter(c => c !== cat);
                        chip.classList.remove('active');
                    } else {
                        categoriasActivas.push(cat);
                        chip.classList.add('active');
                    }
                    cargarMarcadores();
                });
            });
        }
        
        if (filtroMapaMenores) filtroMapaMenores.addEventListener('change', cargarMarcadores);
        if (filtroMapaAireLibre) filtroMapaAireLibre.addEventListener('change', cargarMarcadores);
        
        // Observar cambios de tema oscuro para actualizar tiles y botones del mapa
        const themeObserver = new MutationObserver(() => {
            if (map && mapInitialized) {
                const currentTileUrl = getTileUrl();
                map.eachLayer((layer) => {
                    if (layer._url && (layer._url.includes('basemaps') || layer._url.includes('cartocdn'))) {
                        map.removeLayer(layer);
                    }
                });
                L.tileLayer(currentTileUrl, {
                    attribution: '&copy; <a href="https://carto.com/">CartoDB</a> | &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
                }).addTo(map);
                
                // Forzar actualización visual de los botones de zoom
                setTimeout(() => { map.invalidateSize(); }, 100);
            }
        });
        themeObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        
        // Inicializar mapa después de que script.js termine de cargar
        setTimeout(function() {
            initMap();
            renderizarFiltrosMapa();
        }, 500);
        
        window.addEventListener('resize', function() {
            if (map && mapInitialized) {
                setTimeout(function() { map.invalidateSize(); }, 200);
            }
        });
    </script>
</body>
</html>
